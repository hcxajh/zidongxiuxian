<style>

nt(135deg,var(--secondary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:2rem;border:3px solid rgba(255,255,255,0.2)}.character-info{flex:1}.character-name{font-size:1.2rem;font-weight:bold}.character-realm{font-size:0.9rem;color:var(--accent);padding:2px 8px;background:rgba(255,0,110,0.2);border-radius:10px;display:inline-block;margin-top:5px}.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat-item{text-align:center;padding:10px;background:rgba(0,0,0,0.3);border-radius:10px}.stat-value{font-size:1.1rem;font-weight:bold;color:var(--primary)}.stat-label{font-size:0.75rem;color:var(--text-dim)}.spirit-bar-container{position:relative;height:24px;background:rgba(0,0,0,0.5);border-radius:12px;overflow:hidden;border:1px solid rgba(0,212,255,0.2)}.spirit-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary),var(--accent));border-radius:12px;transition:width .3s}.spirit-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.8rem;font-weight:bold;color:#fff;text-shadow:0 0 10px rgba(0,0,0,0.8);z-index:2}.spirit-info{display:flex;justify-content:space-between;margin-top:8px;font-size:0.85rem}.vortex-container{position:relative;width:150px;height:150px;margin:20px auto;display:flex;justify-content:center;align-items:center}.vortex{position:absolute;border:2px solid rgba(0,212,255,0.3);border-top-color:var(--primary);border-radius:50%;animation:vortexSpin 3s linear infinite}.vortex:nth-child(2){width:70%;height:70%;animation-duration:2s;animation-direction:reverse;border-top-color:var(--secondary)}.vortex:nth-child(3){width:40%;height:40%;animation-duration:1s;border-top-color:var(--accent)}@keyframes vortexSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.collect-btn{display:block;width:100%;max-width:200px;margin:0 auto 20px;padding:15px 30px;font-size:1.1rem;font-family:inherit;background:linear-gradient(145deg,#1a1a3a,#0a0a2a);color:var(--primary);border:2px solid var(--primary);border-radius:50px;cursor:pointer;transition:all .3s}.collect-btn:hover{background:linear-gradient(145deg,var(--primary),var(--secondary));color:#fff;box-shadow:0 0 30px rgba(0,212,255,0.6)}.collect-btn.collecting{animation:pulse .5s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(0,212,255,0.4)}50%{box-shadow:0 0 40px rgba(0,212,255,0.8)}}.auto-collect{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px}.toggle-switch{position:relative;width:44px;height:24px;background:rgba(0,0,0,0.5);border-radius:12px;cursor:pointer;border:1px solid rgba(0,212,255,0.3)}.toggle-switch.active{background:linear-gradient(90deg,var(--primary),var(--secondary))}.toggle-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s}.toggle-switch.active .toggle-knob{transform:translateX(20px)}.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px}.quick-btn{padding:12px 8px;font-size:0.75rem;font-family:inherit;background:rgba(20,20,40,0.8);color:var(--text-dim);border:1px solid rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:5px}.quick-btn:hover{background:rgba(0,212,255,0.2);color:var(--primary)}.quick-btn-icon{font-size:1.3rem}.log-panel{max-height:150px;overflow-y:auto}.log-entry{font-size:0.8rem;color:var(--text-dim);padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)}.bag-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.bag-capacity{font-size:0.85rem;color:var(--text-dim)}.bag-capacity span{color:var(--gold)}.bag-tabs{display:flex;gap:8px;margin-bottom:15px;overflow-x:auto}.bag-tab{padding:8px 16px;font-size:0.85rem;background:rgba(0,0,0,0.3);color:var(--text-dim);border:1px solid rgba(255,255,255,0.1);border-radius:20px;cursor:pointer;white-space:nowrap}.bag-tab.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}.bag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.bag-item{aspect-ratio:1;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;position:relative}.bag-item:hover{border-color:var(--primary)}.bag-item.empty{opacity:0.3;cursor:default}.bag-item-icon{font-size:1.8rem}.bag-item-count{position:absolute;bottom:4px;right:4px;font-size:0.7rem;background:rgba(0,0,0,0.7);padding:2px 5px;border-radius:8px;color:var(--gold)}.bag-item-name{font-size:0.65rem;color:var(--text-dim);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}.modal.active{display:flex}.modal-content{background:linear-gradient(145deg,#1a1a2e,#0a0a1a);border:1px solid rgba(0,212,255,0.3);border-radius:20px;padding:25px;width:100%;max-width:350px;position:relative;animation:popIn .3s}@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}.modal-title{font-size:1.3rem;text-align:center;margin-bottom:20px}.modal-btn{width:100%;padding:12px;font-size:0.9rem;font-family:inherit;border-radius:10px;cursor:pointer;margin-top:15px}.modal-btn.primary{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border:none}.modal-btn.secondary{background:0;color:var(--text-dim);border:1px solid rgba(255,255,255,0.2)}.skill-tabs{display:flex;gap:8px;margin-bottom:15px;overflow-x:auto}.skill-tab{padding:8px 16px;font-size:0.85rem;background:rgba(0,0,0,0.3);color:var(--text-dim);border:1px solid rgba(255,255,255,0.1);border-radius:20px;cursor:pointer;white-space:nowrap}.skill-tab.active{background:linear-gradient(135deg,var(--primary),var d:0;color:var(--gold);border:1px solid var(--gold)}.no-partner{text-align:center;padding:40px 20px;color:var(--text-dim)}.no-partner-icon{font-size:4rem;margin-bottom:15px;opacity:0.5}.find-partner-btn{margin-top:20px;padding:15px 40px;font-size:1rem;font-family:inherit;background:linear-gradient(135deg,var(--accent),var(--secondary));color:#fff;border:none;border-radius:25px;cursor:pointer}.beast-list{display:flex;flex-direction:column;gap:12px}.beast-card{display:flex;align-items:center;gap:12px;padding:15px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:12px}.beast-avatar{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#00ff88,var(--primary));display:flex;align-items:center;justify-content:center;font-size:1.5rem;position:relative}.beast-quality{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;font-size:0.6rem;display:flex;align-items:center;justify-content:center}.beast-quality.common{background:#888}.beast-quality.rare{background:#00d4ff}.beast-quality.elite{background:#7b2cbf}.beast-quality.legendary{background:var(--gold)}.beast-info{flex:1}.beast-name{font-size:0.95rem;font-weight:bold}.beast-type{font-size:0.8rem;color:var(--text-dim)}.beast-level{font-size:0.75rem;color:var(--primary)}.beast-exp{display:flex;align-items:center;gap:8px;margin-top:5px}.exp-bar{flex:1;height:4px;background:rgba(0,0,0,0.5);border-radius:2px;overflow:hidden}.exp-fill{height:100%;background:var(--primary)}.beast-btn{padding:6px 10px;font-size:0.7rem;border-radius:8px;cursor:pointer}.beast-btn.fight{background:rgba(255,0,110,0.2);color:var(--accent);border:1px solid var(--accent)}.beast-btn.train{background:rgba(0,212,255,0.2);color:var(--primary);border:1px solid var(--primary)}

.map-page{padding-bottom:20px}.map-header{margin-bottom:15px}.current-location{display:flex;align-items:center;gap:8px;padding:12px 15px;background:rgba(0,212,255,0.15);border-radius:10px;border:1px solid rgba(0,212,255,0.3)}.current-location-icon{font-size:1.3rem}.current-location-name{font-size:1rem;color:var(--primary);font-weight:bold}.current-location-region{font-size:0.75rem;color:var(--text-dim)}.world-tabs{display:flex;gap:8px;margin-bottom:15px;overflow-x:auto}.world-tab{padding:8px 16px;font-size:0.85rem;background:rgba(0,0,0,0.3);color:var(--text-dim);border:1px solid rgba(255,255,255,0.1);border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .3s}.world-tab.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}.region-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}.region-card{padding:15px;background:linear-gradient(145deg,rgba(20,20,40,0.9),rgba(10,10,30,0.95));border:1px solid rgba(255,255,255,0.1);border-radius:12px;cursor:pointer;transition:all .3s}.region-card:hover{border-color:var(--primary)}.region-card.current{border-color:var(--success);background:linear-gradient(145deg,rgba(0,255,136,0.1),rgba(10,30,20,0.95))}.region-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.region-name{font-size:1.1rem;font-weight:bold;color:var(--primary)}.region-level{font-size:0.75rem;padding:3px 8px;background:rgba(123,44,191,0.3);border-radius:10px}.region-desc{font-size:0.8rem;color:var(--text-dim);margin-bottom:8px}.region-specialty{font-size:0.75rem;color:var(--gold)}.region-locations{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.location-tag{padding:4px 10px;font-size:0.7rem;background:rgba(0,0,0,0.3);border-radius:8px;color:var(--text-dim)}.locations-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.location-card{padding:15px;background:linear-gradient(145deg,rgba(20,20,40,0.9),rgba(10,10,30,0.95));border:1px solid rgba(255,255,255,0.1) <body>
<div class="stars" id="stars"></div>
<div class="container"><h1 class="title">仙途</h1>
<div id="home-page" class="page active">
<div class="panel"><div class="character-card"><div class="character-avatar">🧑</div><div class="character-info"><div class="character-name" id="playerName">修仙者</div><div class="character-realm" id="playerRealm">炼气期 第1层</div></div></div></div>
<div class="panel"><div class="panel-title">📊 属性</div><div class="stats-grid"><div class="stat-item"><div class="stat-value" id="statAttack">10</div><div class="stat-label">攻击力</div></div><div class="stat-item"><div class="stat-value" id="statDefense">5</div><div class="stat-label">防御力</div></div><div class="stat-item"><div class="stat-value" id="statSpeed">8</div><div class="stat-label">速度</div></div><div class="stat-item"><div class="stat-value" id="statSpirit">100</div><div class="stat-label">灵气上限</div></div><div class="stat-item"><div class="stat-value" id="statLuck">5</div><div class="stat-label">幸运</div></div><div class="stat-item"><div class="stat-value" id="statCultivate">1.0</div><div class="stat-label">修炼效率</div></div></div></div>
<div class="panel"><div class="panel-title">🌀 灵气修炼</div><div class="spirit-bar-container"><div class="spirit-bar" id="spiritBar" style="width:0%"></div><span class="spirit-text" id="spiritText">0 / 100</span></div><div class="spirit-info"><span>当前: <span id="currentSpirit">0</span></span><span>上限: <span id="maxSpirit">100</span></span></div><div class="vortex-container"><div class="vortex"></div><div class="vortex"></div><div class="vortex"></div></div><button class="collect-btn" id="collectBtn" onclick="collectSpirit()">采集灵气</button><div class="auto-collect"><div class="toggle-switch" id="autoToggle" onclick="toggleAuto()"><div class="toggle-knob"></div></div><span>自动采集</span></div></div>
<div class="panel"><div class="panel-title">⚡ 快捷操作</div><div class="quick-actions"><button class="quick-btn" onclick="navigateTo('bag')"><span class="quick-btn-icon">🎒</span><span>背包</span></button><button class="quick-btn" onclick="navigateTo('skill')"><span class="quick-btn-icon">📜</span><span>功法</span></button><button class="quick-btn" onclick="navigateTo('sect')"><span class="quick-btn-icon">🏛️</span><span>宗门</span></button><button class="quick-btn" onclick="navigateTo('partner')"><span class="quick-btn-icon">💕</span><span>仙侣</span></button></div></div>
<div class="panel"><div class="panel-title">📝 采集记录</div><div class="log-panel" id="logPanel"><div class="log-entry"><span>欢迎来到仙途世界</span></div></div></div>
</div>
<div id="bag-page" class="page"><div class="bag-header"><div class="panel-title" style="margin:0">🎒 背包</div><div class="bag-capacity">容量: <span id="bagUsed">0</span> / <span id="bagMax">50</span></div></div><div class="bag-tabs"><div class="bag-tab active" onclick="filterBag('all',this)">全部</div><div class="bag-tab" onclick="filterBag('material',this)">材料</div><div class="bag-tab" onclick="filterBag('equipment',this)">装备</div><div class="bag-tab" onclick="filterBag('drug',this)">丹药</div></div><div class="bag-grid" id="bagGrid"></div></div>
<div id="skill-page" class="page"><div class="panel-title">📜 功法</div><div class="skill-tabs"><div class="skill-tab active" onclick="filterSkill('all',this)">全部</div><div class="skill-tab" onclick="filterSkill('attack',this)">攻击</div><div class="skill-tab" onclick="filterSkill('defense',this)">防御</div><div class="skill-tab" onclick="filterSkill('aux',this)">辅助</div></div><div class="skill-list" id="skillList"></div></div>

<script>
const gameData={player:{name:'修仙者',realm:'炼气期',level:1,spirit:0,maxSpirit:100,attack:10,defense:5,speed:8,luck:5,cultivateRate:1},bag:{items:[{id:1,name:'灵石',icon:'💰',type:'material',count:100},{id:2,name:'灵气草',icon:'🌿',type:'material',count:5},{id:3,name:'筑基丹',icon:'💊',type:'drug',count:1},{id:4,name:'铁剑',icon:'⚔️',type:'equipment',count:1},{id:5,name:'护甲',icon:'🛡️',type:'equipment',count:1}],max:50},skills:[{id:1,name:'引气术',icon:'🌀',type:'aux',grade:'凡品',desc:'提升修炼效率',level:1,equipped:true},{id:2,name:'火球术',icon:'🔥',type:'attack',grade:'凡品',desc:'发射火球攻击',level:1,equipped:false},{id:3,name:'护体神光',icon:'🛡️',type:'defense',grade:'灵品',desc:'提升防御力',level:0,equipped:false},{id:4,name:'御风术',icon:'💨',type:'aux',grade:'凡品',desc:'提升速度',level:0,equipped:false}],sect:{name:'青云宗',level:1,money:1000,prestige:0,disciples:[]},partners:[],beasts:[{id:1,name:'小青',type:'狐族',quality:'rare',level:1,exp:0,maxExp:100}]};
let autoCollect=false,autoInterval=null;
function init(){createStars();renderBag();renderSkills();renderDisciples();renderPartners();renderBeasts();updateUI()}
function createStars(){const s=document.getElementById('stars');for(let i=0;i<100;i++){const x=document.createElement('div');x.className='star';x.style.left=Math.random()*100+'%';x.style.top=Math.random()*100+'%';x.style.width=x.style.height=Math.random()*2+1+'px';x.style.animationDelay=Math.random()*2+'s';s.appendChild(x)}}
function navigateTo(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p+'-page').classList.add('active');document.querySelectorAll('.nav-item').forEach((x,i)=>{x.classList.toggle('active',['home','map','bag','skill','sect','partner'].indexOf(p)===i)});if(p==='map')renderMap()}
function collectSpirit(){const b=document.getElementById('collectBtn');b.classList.add('collecting');const g=Math.floor(Math.random()*10*gameData.player.cultivateRate)+5;gameData.player.spirit=Math.min(gameData.player.spirit+g,gameData.player.maxSpirit);if(gameData.player.spirit>=gameData.player.maxSpirit)addLog('灵气已满！可选择突破境界');addLog('采集灵气 +'+g);updateUI();setTimeout(()=>b.classList.remove('collecting'),500)}
function toggleAuto(){autoCollect=!autoCollect;document.getElementById('autoToggle').classList.toggle('active',autoCollect);autoCollect?autoInterval=setInterval(collectSpirit,2000):clearInterval(autoInterval)}
function updateUI(){document.getElementById('playerName').textContent=gameData.player.name;document.getElementById('playerRealm').textContent=gameData.player.realm+' 第'+gameData.player.level+'层';const p=gameData.player.spirit/gameData.player.maxSpirit*100;document.getElementById('spiritBar').style.width=p+'%';document.getElementById('spiritText').textContent=gameData.player.spirit+' / '+gameData.player.maxSpirit;document.getElementById('currentSpirit').textContent=gameData.player.spirit;document.getElementById('maxSpirit').textContent=gameData.player.maxSpirit;document.getElementById('statAttack').textContent=gameData.player.attack;document.getElementById('statDefense').textContent=gameData.player.defense;document.getElementById('statSpeed').textContent=gameData.player.speed;document.getElementById('statSpirit').textContent=gameData.player.maxSpirit;document.getElementById('statLuck').textContent=gameData.player.luck;document.getElementById('statCultivate').textContent=gameData.player.cultivateRate.toFixed(1);document.getElementById('sectMoney').textContent=gameData.sect.money;document.getElementById('sectPrestige').textContent=gameData.sect.prestige}
function addLog(m){const p=document.getElementById('logPanel');const e=document.createElement('div');e.className='log-entry';e.innerHTML='<span>'+m+'</span>';p.insertBefore(e,p.firstChild);if(p.children.length>20)p.lastChild.remove()}
function renderBag(){const g=document.getElementById('bagGrid');g.innerHTML='';document.getElementById('bagUsed').textContent=gameData.bag.items.length;document.getElementById('bagMax').textContent=gameData.bag.max;for(let i=0;i<gameData.bag.max;i++){const it=gameData.bag.items[i],d=document.createElement('div');if(it){d.className='bag-item';d.innerHTML='<div class="bag-item-icon">'+it.icon+'</div><div class="bag-item-count">'+it.count+'</div><div class="bag-item-name">'+it.name+'</div>';d.onclick=()=>showItemDetail(it)}else{d.className='bag-item empty'}g.appendChild(d)}}
function showItemDetail(it){document.getElementById('modalTitle').textContent=it.name;document.getElementById('modalBody').innerHTML='<div style="text-align:center;font-size:3rem;margin-bottom:15px">'+it.icon+'</div><p style="color:var(--text-dim);text-align:center;margin-bottom:15px">类型: '+it.type+' | 数量: '+it.count+'</p><button class="modal-btn primary" onclick="closeModal()">使用</button>';document.getElementById('itemModal').classList.add('active')}
function closeModal(){document.getElementById('itemModal').classList.remove('active')}
function filterBag(t,e){document.querySelectorAll('.bag-tab').forEach(x=>x.classList.remove('active'));e.classList.add('active');renderBag()}
function renderSkills(){const l=document.getElementById('skillList');l.innerHTML='';gameData.skills.forEach(s=>{const c=document.createElement('div');c.className='skill-card'+(s.equipped?' equipped':'');c.innerHTML='<div class="skill-icon">'+s.icon+'</div><div class="skill-info"><div class="skill-name">'+s.name+'<span class="skill-grade">'+s.grade+'</span></div><div class="skill-desc">'+s.desc+'</div><div class="skill-level">等级 '+s.level+'</div></div><div class="skill-action '+(s.equipped?'unequip':'equip')+'" onclick="toggleSkill('+s.id+')">'+(s.equipped?'已装备':'装备')+'</div>';l.appendChild(c)})}
function toggleSkill(id){const s=gameData.skills.find(x=>x.id===id);if(s){s.equipped=!s.equipped;renderSkills()}}
function filterSkill(t,e){document.querySelectorAll(".skill-tab").forEach(x=>x.classList.remove("active"));e.classList.add("active");renderSkills()}
function renderDisciples(){const l=document.getElementById("discipleList");l.innerHTML="";if(gameData.sect.disciples.length===0){l.innerHTML="<div style=\"text-align:center;color:var(--text-dim);padding:20px\">暂无弟子</div>"}gameData.sect.disciples.forEach(d=>{const c=document.createElement("div");c.className="disciple-card";c.innerHTML="<div class=\"disciple-avatar\">🧑</div><div class=\"disciple-info\"><div class=\"disciple-name\">"+d.name+"</div><div class=\"disciple-realm\">"+d.realm+"</div><div class=\"disciple-loyalty\"><span>忠诚:</span><div class=\"loyalty-bar\"><div class=\"loyalty-fill\" style=\"width:"+d.loyalty+"%\"></div></div><span>"+d.loyalty+"</span></div></div><div class=\"disciple-actions\"><button class=\"disciple-btn train\">修炼</button><button class=\"disciple-btn send\">派遣</button></div>";l.appendChild(c)})}
function recruitDisciple(){const cost=50*(gameData.sect.disciples.length+1);if(gameData.sect.money<cost){alert("灵石不足！需要 "+cost+" 灵石");return}gameData.sect.money-=cost;const names=["小明","小红","小华","小青","小玉","小风","小云","小月"];const realms=["炼气期","筑基期","金丹期"];const newDisciple={id:Date.now(),name:names[Math.floor(Math.random()*names.length)],realm:realms[Math.floor(Math.random()*realms.length)],loyalty:80};gameData.sect.disciples.push(newDisciple);renderDisciples();updateUI();alert("成功招收弟子 "+newDisciple.name+"！")}
function renderPartners(){const l=document.getElementById("partnerList");l.innerHTML="";if(gameData.partners.length===0){l.innerHTML="<div class=\"no-partner\"><div class=\"no-partner-icon\">💕</div><p>还没有仙侣</p><button class=\"find-partner-btn\" onclick=\"findPartner()\">寻找仙侣</button></div>";return}gameData.partners.forEach(p=>{const c=document.createElement("div");c.className="partner-card";c.innerHTML="<div class=\"partner-avatar\">"+p.icon+"</div><div class=\"partner-info\"><div class=\"partner-name\">"+p.name+"</div><div class=\"partner-type\">"+p.type+"</div><div class=\"partner-favor\"><span class=\"favor-label\">好感度</span><div class=\"favor-bar\"><div class=\"favor-fill\" style=\"width:"+p.favor+"%\"></div></div><span class=\"favor-value\">"+p.favor+"</span></div></div><div class=\"partner-actions\"><button class=\"partner-btn cultivate\">双修</button><button class=\"partner-btn gift\">送礼</button></div>";l.appendChild(c)})}
function findPartner(){const types=["修道者","仙人","精灵","龙族"];const icons=["👩","🧚","🐉","🦅"];const newPartner={id:Date.now(),name:"小"+["雪","月","灵","云","倩"][Math.floor(Math.random()*5)],type:types[Math.floor(Math.random()*types.length)],icon:icons[Math.floor(Math.random()*icons.length)],favor:30};gameData.partners.push(newPartner);renderPartners();alert("遇到 "+newPartner.name+" ，好感度 "+newPartner.favor+"！")}
function renderBeasts(){const l=document.getElementById("beastList");l.innerHTML="";gameData.beasts.forEach(b=>{const c=document.createElement("div");c.className="beast-card";const q=b.quality==="rare"?"稀":b.quality==="elite"?"精":b.quality==="legendary"?"传说":"普";c.innerHTML="<div class=\"beast-avatar\">🦊<div class=\"beast-quality "+b.quality+"\">"+q+"</div></div><div class=\"beast-info\"><div class=\"beast-name\">"+b.name+"</div><div class=\"beast-type\">"+b.type+"</div><div class=\"beast-level\">等级 "+b.level+"</div><div class=\"beast-exp\"><div class=\"exp-bar\"><div class=\"exp-fill\" style=\"width:"+(b.exp/b.maxExp*100)+"%\"></div></div><span>"+b.exp+"/"+b.maxExp+"</span></div></div><div class=\"beast-actions\"><button class=\"beast-btn fight\">战斗</button><button class=\"beast-btn train\">训练</button></div>";l.appendChild(c)})}
init();
// 地图数据
const realmLevels={'炼气期':1,'筑基期':2,'金丹期':3,'元婴期':4,'化神期':5,'炼虚期':6,'合体期':7,'大乘期':8,'渡劫期':9};
const locationIcons={'村庄':'🏘️','城池':'🏰','野外':'🌲','洞穴':'🕳️','秘境':'✨','宗门':'🏛️','塔':'🗼','遗迹':'🏚️'};
const mapData={worlds:{mortal_world:{name:'凡间',regions:{central_plain:{name:'中原',description:'地大物博，人杰地灵，是修仙门派聚集之地',dangerousLevel:1,specialty:'灵气均衡',locations:{qingyun_city:{name:'清云城',type:'城池',description:'修仙界著名的中立城池',hasShop:true,hasHealer:true,hasAuction:true,minRealm:'炼气期',connectedLocations:['qingyun_market','qingyun_tavern','west_mountain','east_forest']},qingyun_market:{name:'清云集市',type:'村庄',description:'各种天材地宝',hasShop:true,hasHealer:false,minRealm:'炼气期',connectedLocations:['qingyun_city']},qingyun_tavern:{name:'清云酒馆',type:'村庄',description:'交换情报的去处',hasShop:false,hasHealer:false,minRealm:'炼气期',connectedLocations:['qingyun_city']},west_mountain:{name:'西山',type:'野外',description:'山高林密，有妖禽出没',hasShop:false,hasHealer:false,minRealm:'炼气期',connectedLocations:['qingyun_city','west_cave']},west_cave:{name:'西山洞穴',type:'洞穴',description:'天然洞穴，古修遗宝',hasShop:false,hasHealer:false,minRealm:'筑基期',connectedLocations:['west_mountain']},east_forest:{name:'东林',type:'野外',description:'茂密原始森林',hasShop:false,hasHealer:false,minRealm:'炼气期',connectedLocations:['qingyun_city','deep_forest']},deep_forest:{name:'密林深处',type:'野外',description:'人迹罕至，危机四伏',hasShop:false,hasHealer:false,minRealm:'筑基期',connectedLocations:['east_forest','ancient_tomb']},ancient_tomb:{name:'远古遗迹',type:'遗迹',description:'上古修士陵墓',hasShop:false,hasHealer:false,minRealm:'筑基期',connectedLocations:['deep_forest']}}},north_ice_plain:{name:'北荒雪原',description:'常年积雪，环境恶劣',dangerousLevel:4,specialty:'冰系材料',locations:{ice_city:{name:'冰封城',type:'城池',description:'冰川上的城池',hasShop:true,hasHealer:true,minRealm:'筑基期',connectedLocations:['ice_plateau','frozen_cavern']},ice_plateau:{name:'冰原高原',type:'野外',description:'极寒之地',hasShop:false,hasHealer:false,minRealm:'筑基期',connectedLocations:['ice_city','frozen_cavern']},frozen_cavern:{name:'冰魄洞穴',type:'洞穴',description:'极寒洞穴',hasShop:false,hasHealer:false,minRealm:'筑基期',connectedLocations:['ice_city','ice_plateau']}}},south_volcano:{name:'南疆火山',description:'火山活跃',dangerousLevel:4,specialty:'火系材料',locations:{fire_city:{name:'烈焰城',type:'城池',description:'火山脚下的城池',hasShop:true,hasHealer:true,minRealm:'筑基期',connectedLocations:['volcano_slope','lava_cave']},volcano_slope:{name:'火山坡',type:'野外',description:'火山荒原',hasShop:false,hasHealer:false,minRealm:'筑基期',connectedLocations:['fire_city','lava_cave']},lava_cave:{name:'熔岩洞穴',type:'洞穴',description:'地下熔岩',hasShop:false,hasHealer:false,minRealm:'筑基期',connectedLocations:['fire_city','volcano_slope']}}},west_desert:{name:'西漠',description:'一望无际的沙漠',dangerousLevel:3,specialty:'沙漠特产',locations:{sand_city:{name:'沙海城',type:'城池',description:'绿洲中的城池',hasShop:true,hasHealer:true,minRealm:'筑基期',connectedLocations:['great_dune','ancient_ruins','oasis']},great_dune:{name:'大沙丘',type:'野外',description:'连绵沙丘',hasShop:false,hasHealer:false,minRealm:'筑基期',connectedLocations:['sand_city','ancient_ruins','oasis']},ancient_ruins:{name:'远古遗迹',type:'遗迹',description:'沙尘遗迹',hasShop:false,hasHealer:false,minRealm:'筑基期',connectedLocations:['sand_city','great_dune','underground_palace']},underground_palace:{name:'地下宫殿',type:'秘境',description:'遗迹深处',hasShop:false,hasHealer:false,minRealm:'金丹期',connectedLocations:['ancient_ruins']},oasis:{name:'绿洲',type:'村庄',description:'沙漠生命之源',hasShop:false,hasHealer:false,minRealm:'炼气期',connectedLocations:['sand_city','great_dune']}}},east_sea:{name:'东海',description:'波涛汹涌的海域',dangerousLevel:5,specialty:'海系材料',locations:{island_city:{name:'珊瑚城',type:'城池',description:'海岛上的城池',hasShop:true,hasHealer:true,hasAuction:true,minRealm:'金丹期',connectedLocations:['sea_surface','undersea_palace','dragon_island']},sea_surface:{name:'海面',type:'野外',description:'一望无际的大海',hasShop:false,hasHealer:false,minRealm:'金丹期',connectedLocations:['island_city','undersea_palace','dragon_island']},undersea_palace:{name:'海底宫殿',type:'秘境',description:'上古龙宫遗址',hasShop:false,hasHealer:false,minRealm:'金丹期',connectedLocations:['island_city','sea_surface']},dragon_island:{name:'龙岛',type:'秘境',description:'真龙后裔居住',hasShop:false,hasHealer:false,minRealm:'元婴期',connectedLocations:['island_city','sea_surface']}}}}}},celestial_world:{name:'仙界',minRealm:'化神期',regions:{celestial_court:{name:'天宫',description:'天帝居所',dangerousLevel:0,specialty:'仙气缭绕',locations:{tian_gong:{name:'天宫',type:'城池',description:'金砖玉瓦，霞光万道',hasShop:true,hasHealer:true,hasAuction:true,minRealm:'化神期',connectedLocations:['celestial_platform','immortal_mountain']},celestial_platform:{name:'登仙台',type:'村庄',description:'升仙之所',hasShop:false,hasHealer:false,minRealm:'化神期',connectedLocations:['tian_gong']},immortal_mountain:{name:'万寿山',type:'野外',description:'仙山福地',hasShop:false,hasHealer:false,minRealm:'化神期',connectedLocations:['tian_gong']}}}}}}};
let currentWorld='mortal_world',currentRegion=null,selectedLocation=null;
function renderMap(){updateCurrentLocation();renderRegions();renderLocations()}
function updateCurrentLocation(){const world=mapData.worlds.mortal_world;const region=world.regions.central_plain;const location=region.locations.qingyun_city;document.getElementById('currentLocationName').textContent=location.name;document.getElementById('currentLocationRegion').textContent=region.name}
function renderRegions(){const container=document.getElementById('regionList');container.innerHTML='';const world=mapData.worlds[currentWorld];if(!world||!world.regions)return;for(const[regionId,region]of Object.entries(world.regions)){const card=document.createElement('div');card.className='region-card';card.onclick=()=>{currentRegion=regionId;renderMap()};const dangerTexts=['安全','低','中等','较高','高','极高','极危'];const dangerText=dangerTexts[Math.min(region.dangerousLevel,dangerTexts.length-1)];const locationCount=Object.keys(region.locations).length;const locationNames=Object.values(region.locations).map(l=>l.name).slice(0,4);card.innerHTML='<div class="region-header"><span class="region-name">'+region.name+'</span><span class="region-level">'+'⚔️'.repeat(Math.min(region.dangerousLevel,5))+' '+dangerText+'</span></div><div class="region-desc">'+region.description+'</div><div class="region-specialty">特产: '+region.specialty+'</div><div class="region-locations">'+locationNames.map(name=>'<span class="location-tag">'+name+'</span>').join('')+(locationCount>4?'<span class="location-tag">+'+(locationCount-4)+'个</span>':'')+'</div>';container.appendChild(card)}}
function renderLocations(){const container=document.getElementById('locationsGrid');container.innerHTML='';let targetRegionId=currentRegion;if(!targetRegionId){targetRegionId='central_plain';currentRegion=targetRegionId}const world=mapData.worlds[currentWorld];const region=world.regions[targetRegionId];for(const[locId,loc]of Object.entries(region.locations)){const card=document.createElement('div');card.className='location-card';card.onclick=()=>showLocationDetail(locId,loc,targetRegionId);const icon=locationIcons[loc.type]||'📍';card.innerHTML='<div class="location-icon">'+icon+'</div><div class="location-name">'+loc.name+'</div><div class="location-type">'+loc.type+'</div><div class="location-status">'+(loc.hasShop?'<span class="has-shop">💰</span>':'')+(loc.hasHealer?'<span class="has-healer">💚</span>':'')+(loc.hasAuction?'<span class="has-auction">🔔</span>':'')+'</div>';container.appendChild(card)}}
function showLocationDetail(locId,loc,regionId){selectedLocation={id:locId,...loc,regionId:regionId};const modal=document.getElementById('itemModal');document.getElementById('modalTitle').textContent=loc.name;document.getElementById('modalBody').innerHTML='<p style="color:var(--text-dim);text-align:center;margin-bottom:15px">'+loc.description+'</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px"><div style="text-align:center;padding:10px;background:rgba(0,0,0,0.3);border-radius:8px"><div style="font-size:0.75rem;color:var(--text-dim)">类型</div><div style="color:var(--primary)">'+loc.type+'</div></div><div style="text-align:center;padding:10px;background:rgba(0,0,0,0.3);border-radius:8px"><div style="font-size:0.75rem;color:var(--text-dim)">境界要求</div><div style="color:var(--primary)">'+loc.minRealm+'</div></div></div><button class="modal-btn primary" onclick="travelToLocation()">前往此地</button>';modal.classList.add('active')}
function travelToLocation(){if(!selectedLocation||!selectedLocation.id)return;closeModal();document.getElementById('currentLocationName').textContent=selectedLocation.name;const world=mapData.worlds[currentWorld];const region=world.regions[selectedLocation.regionId];document.getElementById('currentLocationRegion').textContent=region.name;addLog('已传送到 '+selectedLocation.name+'！')}
</script>
</body>
</html>
